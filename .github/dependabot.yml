version: 2
updates:
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
    groups:
      react:
        patterns:
          - 'react'
          - 'react-test-renderer'
      expo:
        patterns:
          - 'expo'
          - 'expo-*'
    ignore:
      # React and React Native versions are managed by Expo SDK compatibility.
      - dependency-name: 'react'
      - dependency-name: 'react-*'
      - dependency-name: 'react-native'
      - dependency-name: 'react-native-*'
      - dependency-name: '@types/react'
      - dependency-name: '@types/react-*'
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
